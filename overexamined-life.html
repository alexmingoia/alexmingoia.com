	<p>Socrates said the unexamined life isn’t worth living.</p>
<p>I say the over-examined life isn’t worth living.</p>
<p>Self-help books, journaling, daily questions, planners, quantified self, time trackers, finance trackers, health trackers…. robbed my joy and left self-doubt — not clarity.</p>
