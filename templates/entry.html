<!DOCTYPE html>
<html lang="en" charset="UTF-8">
	<head>
		<title>{{title}}</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/alexmingoia/zero.css@2023-07-04/zero.min.css" />

</html>
